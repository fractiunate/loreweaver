files:
  exclude:
    - .env
    - .venv/**
    - __pycache__/**
    - cocoindex.db/**

  include:
    - pattern: .lore/objectives/**/*.md
      role: objective

    - pattern: ./.lore/MISSION.md
      role: mission

    - pattern: .pi/skills/**/*.md
      role: skill

    - pattern: docs/adr/**/*.md
      role: adr

    - pattern: docs/**/*.md
      role: documentation

    - pattern: knowledge/**/*.md
      role: documentation

    - pattern: MISSION.md
      role: mission

    - pattern: README.md
      role: documentation

    - pattern: local-setup.md
      role: documentation

    - pattern: src/**/*.py
      role: code

    - pattern: main.py
      role: code

github:
  issues:
    # Default role is issue.
    - label: bug
      role: bug_report

    - label: feature
      role: feature_request

    - label: documentation
      role: documentation_task

  pull_requests:
    # Default role is pull_request.
    - label: adr
      role: adr_proposal

    - role: feature_merge
      branch_from: feature/
      branch_to: main
