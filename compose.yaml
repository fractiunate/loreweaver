services:
  postgres:
    image: docker.io/pgvector/pgvector:0.8.3-pg18-trixie
    container_name: cocoindex-postgres
    environment:
      POSTGRES_USER: cocoindex
      POSTGRES_PASSWORD: cocoindex
      POSTGRES_DB: cocoindex
    ports:
      - "${POSTGRES_PORT:-15000}:5432"
    volumes:
      - cocoindex_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cocoindex -d cocoindex"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  cocoindex_pgdata: